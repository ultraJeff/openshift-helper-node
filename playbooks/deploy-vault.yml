---
- name: Deploy HashiCorp Vault as a Podman quadlet
  hosts: wing
  tasks:
    - name: Create Vault config directory
      ansible.builtin.file:
        path: /opt/vault/config
        state: directory
        owner: root
        group: root
        mode: "0755"

    - name: Create Vault data directory
      ansible.builtin.file:
        path: /opt/vault/data
        state: directory
        mode: "0777"

    - name: Copy Vault config
      ansible.builtin.copy:
        src: ../files/vault/vault.hcl
        dest: /opt/vault/config/vault.hcl
        owner: root
        group: root
        mode: "0644"
      notify: Restart vault

    - name: Copy Vault quadlet container unit
      ansible.builtin.copy:
        src: ../files/vault/vault.container
        dest: /etc/containers/systemd/vault.container
        owner: root
        group: root
        mode: "0644"
      notify: Reload and restart vault

    - name: Remove old volume unit if present
      ansible.builtin.file:
        path: /etc/containers/systemd/vault.volume
        state: absent
      notify: Reload and restart vault

    - name: Flush handlers to reload systemd before starting
      ansible.builtin.meta: flush_handlers

    - name: Start and enable Vault service
      ansible.builtin.systemd:
        name: vault
        state: started
        enabled: true

    - name: Open firewall port for Vault
      ansible.posix.firewalld:
        port: 8200/tcp
        permanent: true
        immediate: true
        state: enabled

  handlers:
    - name: Restart vault
      ansible.builtin.systemd:
        name: vault
        state: restarted

    - name: Reload and restart vault
      ansible.builtin.systemd:
        daemon_reload: true
      notify: Restart vault
